<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MeetSpace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
            padding: 12px;
        }

        .main-content {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #F0EBE1;
            color: var(--primary-color);
        }

        .admin-badge {
            font-size: 12px;
            color: white;
            background: #dc3545;
            padding: 3px 8px;
            border-radius: 12px;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>

<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand">MeetSpace. <span class="admin-badge">Admin Mode</span></div>
        <div class="nav-user">
            <span id="adminName" class="user-greeting">สวัสดี, แอดมิน</span>
            <button id="logoutBtn" class="btn-outline">ออกจากระบบ</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="sidebar">
            <h4 style="margin-top: 0; color: #888; font-size: 14px;">เมนูจัดการ</h4>
            <button class="btn-primary" id="menuAddRoom">➕ เพิ่มห้องประชุม</button>
            <button class="btn-outline" id="menuAllBookings">📋 คิวการจองทั้งหมด</button>
        </div>

        <div class="main-content">

            <div id="sectionAddRoom">
                <h2 style="margin-top:0; color: var(--primary-color);">สร้างห้องประชุมใหม่</h2>
                <form id="addRoomForm">
                    <div class="form-group">
                        <label>ชื่อห้องประชุม</label>
                        <input type="text" id="roomName" required placeholder="เช่น Meeting Room A">
                    </div>
                    <div class="form-group">
                        <label>ความจุ (จำนวนคน)</label>
                        <input type="number" id="roomCapacity" required placeholder="เช่น 20">
                    </div>
                    <div class="form-group">
                        <label>รายละเอียด / อุปกรณ์ที่มี</label>
                        <textarea id="roomDesc" rows="3"
                            placeholder="เช่น มีโปรเจคเตอร์, กระดานไวท์บอร์ด, แอร์"></textarea>
                    </div>
                    <div class="form-group">
                        <label>อัปโหลดรูปภาพห้อง (ถ้ามี)</label>
                        <input type="file" id="roomImage" accept="image/*">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">💾
                        บันทึกข้อมูลห้อง</button>
                </form>

                <hr style="margin: 40px 0; border: 0; border-top: 2px solid #F0EBE1;">

                <h3 style="color: var(--primary-color);">รายชื่อห้องประชุมปัจจุบัน</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ชื่อห้อง</th>
                                <th>ความจุ</th>
                                <th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="adminRoomList">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="sectionAllBookings" style="display: none;">
                <h2 style="margin-top:0; color: var(--primary-color);">ภาพรวมคิวการจองทั้งหมด</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>หัวข้อประชุม</th>
                                <th>ผู้จอง</th>
                                <th>ห้อง</th>
                                <th>เริ่ม</th>
                                <th>สิ้นสุด</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="allBookingsList">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <div id="editModal"
        style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc; z-index:100; box-shadow:0 0 10px rgba(0,0,0,0.2);">
        <h3>แก้ไขข้อมูลห้อง</h3>
        <input type="hidden" id="editRoomId">
        <div class="form-group"><input type="text" id="editName" placeholder="ชื่อห้อง"></div>
        <div class="form-group"><input type="number" id="editCapacity" placeholder="ความจุ"></div>
        <div class="form-group"><textarea id="editDesc" placeholder="รายละเอียด"></textarea></div>
        <div class="form-group"><input type="file" id="editImage"></div>
        <button class="btn-primary" onclick="saveEdit()">บันทึกการแก้ไข</button>
        <button class="btn-outline" onclick="document.getElementById('editModal').style.display='none'">ยกเลิก</button>
    </div>

    <script src="admin.js"></script>
</body>

</html>
