<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Zenbook</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h1>Zenbook.</h1>
            <p class="subtitle">สร้างบัญชีผู้ใช้ใหม่</p>

            <form id="registerForm">
                <div class="input-group">
                    <label>ชื่อ</label>
                    <input type="text" id="firstname" placeholder="ชื่อของคุณ" required>
                </div>

                <div class="input-group">
                    <label>นามสกุล</label>
                    <input type="text" id="lastname" placeholder="นามสกุลของคุณ" required>
                </div>
                <div class="input-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="ตั้งรหัสผ่านอย่างน้อย 6 ตัว" required>
                </div>
                <button type="submit" class="btn-primary">ยืนยันการสมัคร</button>
            </form>
            <div id="errorMessage" class="error-msg"></div>

            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                มีบัญชีอยู่แล้ว? <a href="index.html"
                    style="color: #8C7B65; text-decoration: underline; font-weight: bold;">เข้าสู่ระบบที่นี่</a>
            </p>
        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
